<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h3 class="mb-3">DANH SÁCH SINH VIÊN</h3>

<!-- 🔍 FORM TÌM KIẾM (theo controller /students/search) -->
<form th:action="@{/students/search}"
    method="get"
    class="row g-3 mb-4">

    <div class="col-md-6">
        <input type="text"
            name="keyword"
            class="form-control"
            placeholder="Nhập tên hoặc ID..."
            th:value="${keyword}">
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-secondary w-100">
            Tìm kiếm
        </button>
    </div>

    <div class="col-md-2">
        <a th:href="@{/students}" class="btn btn-outline-dark w-100">
            Hiển thị tất cả
        </a>
    </div>
</form>

<!-- FORM THÊM / SỬA -->
<form th:action="@{/students/save}"
    th:object="${student}"
    method="post"
    class="row g-3 mb-4">

    <!-- ID ẩn để sửa -->
    <input type="hidden" th:field="*{id}"/>

    <div class="col-md-4">
        <label for="name" class="form-label">Họ tên</label>
        <input id="name"
            type="text"
            th:field="*{name}"
            class="form-control"
            required>
    </div>

    <div class="col-md-2">
        <label for="age" class="form-label">Tuổi</label>
        <input id="age"
            type="number"
            th:field="*{age}"
            class="form-control"
            required>
    </div>

    <div class="col-md-4">
        <label for="email" class="form-label">Email</label>
        <input id="email"
            type="email"
            th:field="*{email}"
            class="form-control"
            required>
    </div>

    <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">
            Lưu
        </button>
    </div>
</form>

<!-- BẢNG DANH SÁCH -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Họ tên</th>
        <th>Tuổi</th>
        <th>Email</th>
        <th width="150">Thao tác</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="sv : ${students}">
        <td th:text="${sv.id}"></td>
        <td th:text="${sv.name}"></td>
        <td th:text="${sv.age}"></td>
        <td th:text="${sv.email}"></td>
        <td>
            <a th:href="@{/students/edit/{id}(id=${sv.id})}"
                class="btn btn-warning btn-sm">
                Sửa
            </a>

            <form th:action="@{/students/delete/{id}(id=${sv.id})}"
                method="get"
                style="display:inline">
                <button type="submit"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Bạn có chắc muốn xóa?')">
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
